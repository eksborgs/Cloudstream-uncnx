name: Build CloudStream Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Plugin
        run: |
          mkdir -p build_output
          zip -r build_output/UncenxProvider.zip src/ manifest.json

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: UncenxProvider-Plugin
          path: build_output/
