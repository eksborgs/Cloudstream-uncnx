name: Build CloudStream Plugin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Plugins Conditional Logic
        run: |
          if [ -f gradlew ]; then
            echo "Memproses ./gradlew..."
            chmod +x gradlew
            ./gradlew make --stacktrace
          elif [ -f build.gradle.kts ] || [ -f build.gradle ]; then
            echo "Memproses gradle sistem..."
            gradle make --stacktrace
          else
            echo "Tiada fail Gradle dikesan. Memintas kompilasi logik dan mengekstrak manifest sahaja."
            mkdir -p build
            cp plugins.json build/ 2>/dev/null || true
          fi

      - name: Deploy to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build
          branch: builds
          commit-message: "Deploy artifacts via robust conditional pipeline"
