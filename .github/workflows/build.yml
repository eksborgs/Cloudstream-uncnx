name: Build CloudStream Plugin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Plugins
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew make --no-daemon
          else
            gradle make --no-daemon
          fi

      - name: Deploy to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build
          branch: builds
