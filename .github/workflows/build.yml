name: Build CloudStream Plugin
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Plugins
        run: |
          if [ -f gradlew ]; then
            echo "✅ Using ./gradlew"
            chmod +x gradlew
            ./gradlew make --stacktrace
          elif [ -f build.gradle.kts ] || [ -f build.gradle ]; then
            echo "✅ Using gradle"
            gradle make --stacktrace
          else
            echo "⚠️ No Gradle found. Skipping."
            mkdir -p build
            echo '{"status":"skipped"}' > build/plugins.json
          fi
          ls -la build/ || true
